experiment_name: scaling_study
output_root: outputs
data:
  dataset_dir: data/niah_research
  lengths: [1000, 2000, 4000]
  max_seq_len: 4000
  train_samples_per_length: 1024
  val_samples_per_length: 256
  test_samples_per_length: 256
  vocab_size: 1024
  num_passkeys: 256
  num_needles: 1
  include_noise_words: true
  seed: 123
model:
  model_type: gru
  d_model: 256
  embedding_dim: 256
  hidden_dim: 256
  num_layers: 2
  dropout: 0.1
  bidirectional: false
  memory_stride: 8
  memory_top_k: 8
  transformer_heads: 8
  transformer_layers: 4
  transformer_ff_dim: 1024
training:
  batch_size: 32
  epochs: 20
  learning_rate: 0.0005
  weight_decay: 0.0001
  grad_clip: 1.0
  seed: 123
  num_workers: 2
  device: auto
  use_amp: true
  amp_dtype: bfloat16
  scheduler_type: cosine
  scheduler_min_lr: 0.00001
  pin_memory: true
  persistent_workers: true
  skip_completed: true
  curriculum_enabled: true
  curriculum_lengths:
    - [1000, 2000]
    - [1000, 2000, 4000]
