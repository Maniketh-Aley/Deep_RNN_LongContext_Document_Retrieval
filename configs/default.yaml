experiment_name: default_gru
output_root: outputs
data:
  dataset_dir: data/niah_synthetic
  lengths: [1000, 2000, 4000, 8000]
  max_seq_len: 8000
  train_samples_per_length: 256
  val_samples_per_length: 64
  test_samples_per_length: 64
  vocab_size: 512
  num_passkeys: 256
  num_needles: 1
  include_noise_words: true
  seed: 123
model:
  model_type: gru
  d_model: 128
  embedding_dim: 128
  hidden_dim: 128
  num_layers: 1
  dropout: 0.1
  bidirectional: false
  memory_stride: 32
  memory_top_k: 4
  transformer_heads: 4
  transformer_layers: 2
  transformer_ff_dim: 256
training:
  batch_size: 16
  epochs: 4
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip: 1.0
  seed: 123
  num_workers: 0
  device: auto
